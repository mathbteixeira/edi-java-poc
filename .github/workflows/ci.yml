name: Java CI with Maven

# This block tells GitHub to run this pipeline every time you push to the main branch
# or create a Pull Request targeting the main branch.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up the exact Java version we used in our Dockerfile
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches downloaded dependencies to speed up future runs

      # 3. Run the robust test suite (Spring MVC, Camel Routes, and Domain Logic)
      - name: Run Unit & Integration Tests
        run: mvn clean test

      # 4. Verify the application actually compiles into a deployable artifact
      - name: Build Spring Boot Jar
        run: mvn clean package -DskipTests

      # 5. Verify the Dockerfile builds successfully
      - name: Verify Docker Build
        run: docker build -t edi-poc-test .