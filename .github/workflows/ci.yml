name: Java CI with Maven

# This block tells GitHub to run this pipeline every time you push to the main branch
# or create a Pull Request targeting the main branch.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # Spins up a fresh, clean Ubuntu Linux container
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository's code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Automatically caches dependencies to make future runs much faster

      # Step 3: Run the automated tests
      - name: Run Tests
        run: mvn clean test

      # Step 4: Verify the application can package successfully into a JAR file
      - name: Build Project
        run: mvn clean package -DskipTests